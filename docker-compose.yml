services:
  api:
    container_name: medivoice-api
    build:
      context: ./node-service
      dockerfile: Dockerfile
    ports:
      - "5001:5001"
    env_file:
      - ./node-service/.env
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongodb:27017/medivoice
      - WHISPER_SERVICE_URL=http://whisper:8000
    depends_on:
      - mongodb
      - whisper
    networks:
      - medivoice-network
    restart: unless-stopped

  whisper:
    container_name: medivoice-whisper
    build:
      context: ./whisper-service
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    networks:
      - medivoice-network
    restart: unless-stopped

  mongodb:
    container_name: medivoice-mongodb
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - medivoice-network
    restart: unless-stopped

networks:
  medivoice-network:
    driver: bridge

volumes:
  mongo-data:
